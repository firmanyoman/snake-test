<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <button id="restart" type="button" hidden>Restart</button>
      </div>
      <canvas id="game" width="400" height="400" aria-label="Snake game" role="img"></canvas>
      <p id="message">Press any arrow key to start.</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
